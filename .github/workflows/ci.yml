name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install this package (camt053 resolves from PyPI)
        run: |
          python -m pip install --upgrade pip
          # Editable so the branch-coverage gate measures the code that runs;
          # the camt053 dependency is pulled from PyPI.
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install this package (camt053 resolves from PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install "ruff==0.1.15" "black==26.5.1" mypy

      - name: Ruff check
        run: ruff check camt053_mcp/

      - name: Black check
        run: black --check camt053_mcp/ tests/

      - name: Mypy
        run: mypy camt053_mcp/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Bandit
        run: bandit -r camt053_mcp/ -ll

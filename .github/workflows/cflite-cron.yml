name: ClusterFuzzLite batch fuzzing

# Longer scheduled fuzzing run that grows and prunes the persistent corpus
# stored in this repository's GitHub Actions cache.

on:
  schedule:
    # Weekly, Monday 05:00 UTC (offset from CodeQL/Scorecard schedules).
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  batch-fuzzing:
    name: Batch fuzz (address)
    runs-on: ubuntu-latest
    steps:
      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          sanitizer: address

      - name: Run fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 1800
          mode: batch
          sanitizer: address

# Publish server.json to the official MCP registry
# (registry.modelcontextprotocol.io).
#
# Runs automatically when a GitHub Release is published, and can be
# dispatched manually to (re)submit the current server.json — e.g. to
# publish a version whose release predates this workflow.
#
# Auth is GitHub OIDC: the io.github.sebastienrousseau/* namespace is
# proven by this repository's ownership, so no long-lived token is
# stored. The publisher binary is downloaded from the registry
# project's GitHub releases; it is intentionally the latest release
# because the registry API and CLI evolve together and an old pinned
# CLI is the likelier failure mode. The job has no access to PyPI or
# repo-write credentials.
name: MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to MCP registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC login to the MCP registry
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Download mcp-publisher
        run: |
          set -euo pipefail
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"
          case "${arch}" in x86_64) arch=amd64 ;; aarch64) arch=arm64 ;; esac
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${os}_${arch}.tar.gz" \
            | tar xz mcp-publisher
          ./mcp-publisher --version

      - name: Login (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        default: "v0.0.1"

permissions:
  contents: write       # create/update the GitHub Release
  id-token: write       # OIDC token for PyPI Trusted Publishing + sigstore
  attestations: write   # write SLSA build provenance attestations

jobs:
  publish:
    name: Build And Publish
    runs-on: ubuntu-latest
    # Must match the "Environment name" set on the PyPI trusted publisher.
    environment:
      name: pypi
      url: https://pypi.org/p/camt053-mcp
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install poetry twine

      - name: Build distributions
        run: poetry build

      - name: Check distributions
        run: twine check dist/*

      # SLSA Build Level 3 provenance attestations for every distribution
      # file. Bound to the exact files just built, signed via sigstore keyless
      # (Fulcio + Rekor) using the workflow's OIDC identity. Visible on the
      # GitHub workflow run page; verifiable with `gh attestation verify`.
      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "dist/*"

      # Trusted Publishing (OIDC) — no API token/secret required. Requires a
      # matching publisher to be configured on PyPI for this repo + workflow.
      # ``attestations: true`` emits PEP 740 sigstore attestations alongside
      # the uploaded distributions so PyPI shows them on the project page.
      # ``skip-existing`` keeps re-runs safe.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          skip-existing: true

      # Keyless sigstore signatures (Fulcio + Rekor via the workflow's OIDC
      # identity, no secrets) for every distribution, attached to the GitHub
      # release as .sig + .pem so the release is verifiably signed.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign distributions (keyless)
        run: |
          for f in dist/*; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done

      - name: Publish release artifacts to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --repo "${{ github.repository }}" --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* --repo "${{ github.repository }}" --title "${RELEASE_TAG}" --generate-notes
          fi

  sbom:
    # Generate three supply-chain artifacts (CycloneDX 1.6 + SPDX + a
    # pip-licenses JSON manifest) and attach them to the release.
    # ``needs: publish`` ensures the release object exists before uploading.
    name: SBOM (CycloneDX + SPDX + licenses)
    runs-on: ubuntu-latest
    needs: [publish]
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install runtime dependencies
        run: poetry install --no-interaction --only main

      - name: Install SBOM + license tooling
        run: pip install cyclonedx-bom pip-licenses

      - name: Generate CycloneDX SBOM (JSON)
        run: |
          poetry run cyclonedx-py environment \
            --of JSON \
            -o "camt053-mcp-${RELEASE_TAG}.cdx.json"

      - name: Generate SPDX SBOM (JSON)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: "camt053-mcp-${{ env.RELEASE_TAG }}.spdx.json"
          upload-artifact: false
          upload-release-assets: false

      - name: Generate pip-licenses manifest
        run: |
          poetry run pip-licenses \
            --format=json \
            --with-urls --with-license-file --no-license-path \
            --output-file "camt053-mcp-${RELEASE_TAG}.licenses.json"

      - name: Upload SBOMs + license manifest to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            "camt053-mcp-${RELEASE_TAG}.cdx.json" \
            "camt053-mcp-${RELEASE_TAG}.spdx.json" \
            "camt053-mcp-${RELEASE_TAG}.licenses.json" \
            --repo "${{ github.repository }}" --clobber

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-bundle
          path: |
            camt053-mcp-*.cdx.json
            camt053-mcp-*.spdx.json
            camt053-mcp-*.licenses.json
          if-no-files-found: warn

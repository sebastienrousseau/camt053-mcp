name: MCP Protocol Conformance

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect:
    name: MCP Inspector (tools/list, resources/list, prompts/list)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Install camt053-mcp
        run: pip install .

      - name: List tools via MCP Inspector CLI
        run: npx -y @modelcontextprotocol/inspector --cli camt053-mcp --method tools/list

      - name: List resources via MCP Inspector CLI
        run: npx -y @modelcontextprotocol/inspector --cli camt053-mcp --method resources/list

      - name: List prompts via MCP Inspector CLI
        run: npx -y @modelcontextprotocol/inspector --cli camt053-mcp --method prompts/list
